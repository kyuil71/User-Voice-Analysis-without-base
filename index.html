    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const safeGetItem = (key) => {
            try { return localStorage.getItem(key); } catch (e) { return null; }
        };
        const safeSetItem = (key, value) => {
            try { localStorage.setItem(key, value); } catch (e) { console.warn("Storage restricted"); }
        };

        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    const iconName = name.replace(/([A-Z])/g, "-$1").toLowerCase().replace(/^-/, "");
                    iconRef.current.innerHTML = `<i data-lucide="${iconName}" class="${className}"></i>`;
                    window.lucide.createIcons({ root: iconRef.current });
                }
            }, [name, size, className]);
            return <span ref={iconRef} style={{ width: size, height: size, display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}></span>;
        };

        const MODEL_NAME = "gemini-flash-latest"; 
        const SESSION_KEY = "gemini_api_key_ux_hub_integrated";

        const StepTitle = ({ title, desc }) => (
            <div className="mb-8 pt-2 animate-fade-in">
                <h2 className="text-[32px] font-black text-slate-900 leading-[1.3] mb-3 whitespace-pre-line tracking-tight">{title}</h2>
                <p className="text-blue-600 font-bold text-[15px] tracking-tight break-keep">{desc}</p>
            </div>
        );

        const PROMPTS = {
            STEP1_PLAN: (data, note) => {
                const numberedData = data.split('\n').map((line, i) => `[ID:${i}] ${line}`).join('\n');
                return `Data: "${numberedData}"\n${note ? `[사용자 수정 요청]: ${note}` : ""}\n데이터를 분석하여 전체 요약(EXECUTIVE SUMMARY)과 5~7개의 핵심 카테고리 이름을 도출하십시오. 분석 요약(summary)은 대학생이 쉽게 이해할 수 있는 평이하고 명확한 어휘를 사용하여 한국어로 작성하십시오. 답변 내에 ** 강조 표시를 절대로 포함하지 마십시오.\n[중요1]: "summary"의 내용은 반드시 4줄에서 5줄 분량으로만 작성하십시오.\n[중요2]: 불필요한 설명 없이 즉시 JSON만 출력하십시오.\nProvide JSON: {"summary": "EXECUTIVE SUMMARY", "categoryNames": ["카테고리1", "카테고리2"]}`;
            },
            STEP1_DETAIL: (data, categoryName) => {
                const numberedData = data.split('\n').map((line, i) => `[ID:${i}] ${line}`).join('\n');
                return `Data: "${numberedData}"\nCategory: "${categoryName}"\n해당 카테고리에 대한 분석 요약과 포함되는 원문의 고유 번호(ID)를 매핑하십시오. 요약은 대학생이 쉽게 이해할 수 있는 평이하고 명확한 수준으로 한국어로 작성하며 ** 강조 표시는 절대 금지합니다.\n[중요1]: "summary" 분석 내용은 반드시 4줄에서 5줄 분량으로만 작성하십시오.\n[중요2]: "opinions" 값은 배열이 아닌 쉼표로 구분된 문자열(예: "0,3,15,202") 형식으로 100% 모두 포함하십시오. 절대로 누락시키지 마십시오.\n[중요3]: "count" 값은 추출된 원문 ID의 총 개수와 정확히 일치해야 합니다.\nProvide JSON: {"summary": "분석 내용", "count": 0, "opinions": "0,3,15"}`;
            },
            
            STEP2_PLAN: (data, note) => {
                const numberedData = data.split('\n').map((line, i) => `[ID:${i}] ${line}`).join('\n');
                return `Data: "${numberedData}"\n${note ? `[사용자 수정 요청]: ${note}` : ""}\n디자인 및 UX 측면에서 정교하게 세분화된 카테고라이징을 수행하여, 전체 요약(UX/DESIGN SUMMARY)과 이슈 이름들을 도출하십시오. 분석 요약은 대학생이 쉽게 이해할 수 있는 평이하고 명확한 어휘를 사용하여 한국어로 작성하며 ** 강조 표시는 금지합니다.\n[중요1]: "summary"의 내용은 반드시 4줄에서 5줄 분량으로만 작성하십시오.\n[중요2]: 불필요한 설명 없이 즉시 JSON만 출력하십시오.\nProvide JSON: {"summary": "UX/DESIGN SUMMARY", "categoryNames": ["이슈1", "이슈2"]}`;
            },
            STEP2_DETAIL: (data, categoryName) => {
                const numberedData = data.split('\n').map((line, i) => `[ID:${i}] ${line}`).join('\n');
                return `Data: "${numberedData}"\nCategory: "${categoryName}"\n해당 UX/디자인 이슈에 대한 분석 요약과 원문의 고유 번호(ID)를 매핑하십시오. 요약은 대학생이 쉽게 이해할 수 있는 평이하고 명확한 수준으로 한국어로 작성하며 ** 강조 표시는 절대 금지합니다.\n[중요1]: "summary" 분석 내용은 반드시 4줄에서 5줄 분량으로만 작성하십시오.\n[중요2]: "opinions" 값은 배열이 아닌 쉼표로 구분된 문자열(예: "0,3,15,202") 형식으로 100% 모두 포함하십시오. 절대로 누락시키지 마십시오.\n[중요3]: "count" 값은 추출된 원문 ID의 총 개수와 정확히 일치해야 합니다.\nProvide JSON: {"summary": "분석 내용", "count": 0, "opinions": "0,3,15"}`;
            },

            ANALYSIS: (perspective, input, note) => `You are a Senior Root Cause Analyst. Strictly lens: [${perspective}]. \n${note ? `[Revision Request]: ${note}` : ""}\nDerivate 3 to 6 distinct 5Why chains. Format: Why [N]\\n왜 [질문]?\\n→ [답변]\\n핵심: [대학생이 쉽게 이해할 수 있는 명확한 요약].\n[중요]: 오직 JSON 형식으로만 즉시 출력하십시오.\nReturn ONLY a JSON: { "rootCauses": [ { "id": 1, "chain": ["Why 1\\\\n왜...\\\\n→...\\\\n핵심:...","Why 2...","Why 3...","Why 4...","Why 5..."], "realCause": "..." } ] }`,
            
            HYPOTHESIS: (perspective, input, cause, note) => `# Role: 전문 UX 전략 컨설턴트. # Context: 도출된 '5Why 진짜 원인'과 선택된 [${perspective}]을 바탕으로 확장 가설 제시. \n${note ? `[수정 요청 반영]: ${note}` : ""}\n[중요1]: 반드시 [${perspective}]에 철저히 입각하여, 이 관점만의 독특하고 차별화된 전략적 해결책을 도출해야 합니다.\n[중요2]: 반드시 정확히 2개의 제안(가설)만 생성하십시오.\n[중요3]: Step 1(VOC 기반 이슈), Step 2(디자인 솔루션 제안), Step 3(사용자 가치 및 기대 효과) 각각의 내용은 반드시 3~4줄 분량으로, 대학생이 쉽게 이해할 수 있는 평이하고 명확한 수준으로 매우 깊이 있고 풍부한 인사이트가 담기도록 상세하게 작성하십시오.\n[중요4]: 특히 'Step 1. VOC 기반 이슈'의 내용은 반드시 사용자 인터뷰를 통해 발견한 실제 Voice(목소리)를 직접 인용하거나 구체적으로 언급하며, 생생하고 실질적인 현장 내용이 들어가는 것처럼 실감나게 작성해야 합니다.\n[중요5]: 'Step 4. 전략적 해결 방안'은 실행(action) 중심의 실용적이고 현실 가능한 전략이어야 하며, 글머리 기호(- 등)와 줄바꿈(\\n)을 활용한 마크다운 형식으로 4~5줄 분량으로 명확하고 보기 좋게 정리해 주십시오.\n[중요6]: 응답 속도 최적화를 위해 오직 JSON 형식으로만 즉시 출력하십시오.\nReturn ONLY a JSON: { "hypotheses": [ { "id": 1, "title": "...", "step1": "...", "step2": "...", "step3": "...", "step4": "..." }, { "id": 2, "title": "...", "step1": "...", "step2": "...", "step3": "...", "step4": "..." } ] }`
        };

        const AIQuestionBox = ({ qaInput, setQaInput, askAI }) => (
            <div className="p-6 bg-slate-800 rounded-[2rem] shadow-xl space-y-4 my-8 relative overflow-hidden group">
                <div className="absolute inset-0 bg-gradient-to-r from-blue-500/10 to-indigo-500/10 opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                <div className="flex items-center gap-2 text-white relative z-10">
                    <Icon name="MessageSquare" size={18} className="text-blue-400" />
                    <span className="font-bold uppercase tracking-widest text-[15px] opacity-90">AI에게 수정 요청하기</span>
                    <button onClick={() => askAI(qaInput)} className="bg-blue-600 hover:bg-blue-500 text-white p-2.5 rounded-xl ml-auto active:scale-95 transition-all shadow-lg shadow-blue-600/30">
                        <Icon name="Send" size={18} />
                    </button>
                </div>
                <input type="text" value={qaInput} onChange={(e) => setQaInput(e.target.value)} className="w-full bg-white/5 border border-white/10 focus:border-blue-500/50 rounded-xl px-5 py-4 text-white text-[16px] outline-none placeholder:text-white/30 transition-colors relative z-10" placeholder="추가적인 수정 사항을 입력해 주세요" onKeyDown={(e) => e.key === 'Enter' && askAI(qaInput)} />
            </div>
        );

        const Header = ({ step, setStep, copyAccumulatedContent, resetAll, step1Result, step2Result, selectedCategory, rootCauses, deepHypotheses, exportProject }) => {
            const canGoForward = 
                (step === 1 && step1Result) || 
                (step === 2 && step2Result) || 
                (step === 3 && rootCauses?.length > 0) || 
                (step === 4 && deepHypotheses?.length > 0);

            const canGoBack = step > 1;
            
            const getDynamicTitle = () => {
                if (step === 1) return "데이터 입력";
                if (step === 2) return "전체 Affinity 분석";
                if (step === 3) return "UX/Design Affinity 분석";
                if (step === 4) return "원인 분석";
                if (step === 5) return "컨셉 도출";
                return "";
            };

            return (
                <header className="fixed top-0 left-0 right-0 z-50 bg-white/95 backdrop-blur-md px-5 h-14 flex items-center justify-between max-w-[430px] mx-auto border-b border-slate-100">
                    <div className="flex items-center gap-2 flex-1 overflow-hidden">
                        {canGoBack ? (
                            <button onClick={() => setStep(s => s - 1)} className="p-1 -ml-1 text-slate-800 transition-colors active:scale-95 shrink-0" title="뒤로 가기">
                                <Icon name="ChevronLeft" size={20} />
                            </button>
                        ) : <div className="w-7 shrink-0"></div>}
                        <h1 className="font-bold text-[16px] text-slate-800 tracking-tight truncate pb-0.5">{getDynamicTitle()}</h1>
                    </div>
                    <div className="flex items-center gap-3 shrink-0">
                        {canGoForward && (
                            <button onClick={() => setStep(s => s + 1)} className="p-1 text-slate-700 transition-colors active:scale-95" title="앞으로 가기">
                                <Icon name="ChevronRight" size={20} />
                            </button>
                        )}
                        <button onClick={copyAccumulatedContent} className="p-1 text-slate-700 transition-colors active:scale-95" title="리포트 복사">
                            <Icon name="Copy" size={20} />
                        </button>
                        <button onClick={resetAll} className="p-1 text-slate-700 transition-colors active:scale-95" title="데이터 입력 화면으로">
                            <Icon name="Home" size={20} />
                        </button>
                        <button onClick={exportProject} className="p-1 -mr-1 text-slate-700 transition-colors active:scale-95" title="프로젝트 수동 저장">
                            <Icon name="Download" size={20} />
                        </button>
                    </div>
                </header>
            );
        };

        const App = () => {
            const [apiKey, setApiKey] = useState("");
            const [step, setStep] = useState(0); 
            const [rawData, setRawData] = useState("");
            const [itemCount, setItemCount] = useState(0);
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [loadingMsg, setLoadingMsg] = useState("");
            const [error, setError] = useState(null);
            
            const [step1Result, setStep1Result] = useState(null);
            const [step2Result, setStep2Result] = useState(null);
            const [selectedCategory, setSelectedCategory] = useState(null);
            const [deepDiveInput, setDeepDiveInput] = useState("");
            const [perspective, setPerspective] = useState("사용 불편 관점");
            const [rootCauses, setRootCauses] = useState([]);
            const [selectedCauseId, setSelectedCauseId] = useState(null);
            const [deepHypotheses, setDeepHypotheses] = useState([]);

            const [qaInput, setQaInput] = useState("");
            
            const stateRef = useRef();

            useEffect(() => {
                stateRef.current = { step, rawData, itemCount, perspective, deepDiveInput, step1Result, step2Result, selectedCategory, rootCauses, selectedCauseId, deepHypotheses };
            });

            const initDB = () => {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open("UXInsightDB", 1);
                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => resolve(request.result);
                    request.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains("projects")) {
                            db.createObjectStore("projects");
                        }
                    };
                });
            };

            const saveToDB = async (key, data) => {
                try {
                    const db = await initDB();
                    const tx = db.transaction("projects", "readwrite");
                    tx.objectStore("projects").put(data, key);
                } catch (e) {
                    console.error("DB Save Error:", e);
                }
            };

            const loadFromDB = async (key) => {
                try {
                    const db = await initDB();
                    const tx = db.transaction("projects", "readonly");
                    const request = tx.objectStore("projects").get(key);
                    return new Promise((resolve) => {
                        request.onsuccess = () => resolve(request.result);
                        request.onerror = () => resolve(null);
                    });
                } catch (e) {
                    console.error("DB Load Error:", e);
                    return null;
                }
            };

            const clearDB = async (key) => {
                try {
                    const db = await initDB();
                    const tx = db.transaction("projects", "readwrite");
                    tx.objectStore("projects").delete(key);
                } catch (e) {}
            };

            useEffect(() => {
                const checkSavedData = async () => {
                    const savedData = await loadFromDB("autosave_project");
                    if (savedData && savedData.state && step === 0 && apiKey) {
                        if (window.confirm("이전에 작업 중이던 임시 저장 데이터가 있습니다. 이어서 진행하시겠습니까?\n(취소 시 기존 데이터는 삭제되고 새로 시작합니다)")) {
                            const s = savedData.state;
                            setRawData(s.rawData || "");
                            setItemCount(s.itemCount || 0);
                            setStep1Result(s.step1Result || null);
                            setStep2Result(s.step2Result || null);
                            setSelectedCategory(s.selectedCategory || null);
                            setPerspective(s.perspective || "사용 불편 관점");
                            setDeepDiveInput(s.deepDiveInput || "");
                            setRootCauses(s.rootCauses || []);
                            setSelectedCauseId(s.selectedCauseId || null);
                            setDeepHypotheses(s.deepHypotheses || []);

                            let targetStep = s.step;
                            if (targetStep >= 4 && (!s.rootCauses || s.rootCauses.length === 0)) {
                                targetStep = 3;
                            } else if (targetStep >= 5 && (!s.deepHypotheses || s.deepHypotheses.length === 0)) {
                                targetStep = 4;
                            } else if (targetStep >= 6) {
                                targetStep = 5;
                            }
                            setStep(targetStep > 0 ? targetStep : 1);
                        } else {
                            await clearDB("autosave_project");

            const processAndLimitData = (text, showWarning = false) => {
                const lines = text.split('\n').filter(line => line.trim().length > 0);
                if (lines.length > 500) {
                    if (showWarning) alert(`입력된 데이터가 500개를 초과하여 상위 500개만 분석을 진행합니다.`);
                    const limitedLines = lines.slice(0, 500);
                    return { finalData: limitedLines.join('\n'), count: 500 };
                }
                return { finalData: lines.join('\n'), count: lines.length };
            };

            const updateDataAndCount = (text) => {
                const { finalData, count } = processAndLimitData(text, false);
                setRawData(finalData);
                setItemCount(count);
            };

            const handleFileUpload = (e) => {

                reader.onload = (ev) => {
                    try {
                        const data = new Uint8Array(ev.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                        const json = XLSX.utils.sheet_to_json(worksheet, {header: 1});
                        const text = json.map(row => row.join(' ')).join('\n');
                        const { finalData, count } = processAndLimitData(text, true);
                        setRawData(finalData);
                        setItemCount(count);
                    } catch(err) { alert("파일 처리 중 오류 발생"); }
                };

            };
